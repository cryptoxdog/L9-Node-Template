repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        name: "Ruff: format"
      - id: ruff
        name: "Ruff: lint"
        args: ["--fix"]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.390
    hooks:
      - id: pyright
        name: "Pyright: type check"
        pass_filenames: false

  - repo: local
    hooks:
      - id: cursor-rule-drift
        name: "Cursor rule drift check"
        language: system
        entry: uv run python scripts/render_cursor_rules.py --check --diff
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: repo-layout-check
        name: "Repo layout contract check"
        language: system
        entry: uv run python scripts/repo_normalizer_v1.0.0.py --check
        pass_filenames: false
        always_run: true
        stages: [post-checkout]
