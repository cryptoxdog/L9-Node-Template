version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "type:deps"
      - "automation:dependabot"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "type:ci"
      - "automation:dependabot"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
